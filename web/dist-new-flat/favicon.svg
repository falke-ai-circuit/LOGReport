<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="12" fill="#0a0a0f"/>
  <!-- Valmet diamond logo -->
  <g transform="translate(32 32) rotate(45)">
    <!-- Left half (gray/silver) -->
    <rect x="-16" y="-16" width="16" height="32" fill="#e0e0e0"/>
    <!-- Right half (Valmet green) -->
    <rect x="0" y="-16" width="16" height="32" fill="#008a00"/>
    <!-- Center black band -->
    <rect x="-2" y="-16" width="4" height="32" fill="#0a0a0f"/>
    <!-- Top black triangle -->
    <polygon points="-2,-16 2,-16 0,-10" fill="#0a0a0f"/>
    <!-- Bottom black diamond -->
    <polygon points="-4,2 0,-2 4,2 0,6" fill="#0a0a0f"/>
  </g>
</svg>